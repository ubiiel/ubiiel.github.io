<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GegeList</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap');
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<body>
    <div class="container">
        <div class="header">
            <header id="main">GegeList.com</header>
            <i class="fa-solid fa-book"></i>
        </div>
        <div class="areainpt">
            <input id="caixa" type="text" placeholder="Digite aqui...">
            <button class="btnok"><i class="fa-solid fa-check"></i></button>
        </div>
        
        <div class="contLista">
            <div class="box">
                <div id="nulltxt">LISTA VAZIA :(</div>
            </div>
            <span id="direitos">TODOS OS DIREITOS RESERVADOS</span>
        </div>
    </div>

    <div class="fundoCampoVazio fechado">
        <div class="caixa-mensagem">
            <p>Digite uma tarefa antes de continuar!</p>
            <button id="fecharCampoVazio">Ok, entendido!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
